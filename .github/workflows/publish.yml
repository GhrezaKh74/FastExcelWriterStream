name: Publish to NuGet

on:
  push:
    tags:
      - 'v*.*.*'   # trigger on tags like v1.0.0
  workflow_dispatch:  # allow manual run from the Actions tab

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      id-token: write   # required for NuGet Trusted Publishing (OIDC)
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore FastExcelWriterStream.sln

      - name: Build
        run: dotnet build FastExcelWriterStream.sln -c Release --no-restore

      - name: Test
        run: dotnet test tests/FastExcelWriterStream.Tests/FastExcelWriterStream.Tests.csproj -c Release --no-build

      - name: Pack
        run: dotnet pack src/FastExcelWriterStream/FastExcelWriterStream.csproj -c Release --no-build -o ./nupkg

      - name: NuGet login (Trusted Publishing)
        uses: NuGet/login@v1
        id: login
        with:
          user: Ghreza74

      - name: Push to NuGet
        run: dotnet nuget push ./nupkg/*.nupkg --api-key ${{ steps.login.outputs.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
