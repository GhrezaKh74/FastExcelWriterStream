name: Publish to NuGet

on:
  push:
    tags:
      - 'v*.*.*'   # trigger on tags like v1.0.0

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore src/FastExcelWriter/FastExcelWriter.csproj

      - name: Build
        run: dotnet build src/FastExcelWriter/FastExcelWriter.csproj -c Release --no-restore

      - name: Test
        run: dotnet test tests/FastExcelWriter.Tests/FastExcelWriter.Tests.csproj -c Release --no-build

      - name: Pack
        run: dotnet pack src/FastExcelWriter/FastExcelWriter.csproj -c Release --no-build -o ./nupkg

      - name: Push to NuGet
        run: dotnet nuget push ./nupkg/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
